name: Nightly Redis Release Check

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    name: Check for new upstream release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
      needs_build: ${{ steps.check.outputs.needs_build }}
    steps:
      - id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          version="$(gh api repos/redis/redis/releases/latest --jq .tag_name)"
          echo "Upstream latest: $version"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if gh release view "$version" --repo "$REPO" >/dev/null 2>&1; then
            echo "Release $version already published to $REPO"
            echo "needs_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "Release $version not found in $REPO; will build"
            echo "needs_build=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check
    if: needs.check.outputs.needs_build == 'true'
    uses: ./.github/workflows/build-release.yml
    with:
      redis_version: ${{ needs.check.outputs.version }}
    permissions:
      contents: write
