name: Build Redis Release

on:
  workflow_dispatch:
    inputs:
      redis_version:
        description: 'Redis version to build (e.g. 7.4.1)'
        required: true
        type: string
  workflow_call:
    inputs:
      redis_version:
        required: true
        type: string

permissions:
  contents: write

env:
  OPENSSL_VERSION: 3.5.6

jobs:
  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            os: linux
            arch: x86_64
          - runner: ubuntu-22.04-arm
            os: linux
            arch: arm64
          - runner: macos-14
            os: macos
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Install build deps (Linux)
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential pkg-config ca-certificates curl

      - name: Install build deps (macOS)
        if: matrix.os == 'macos'
        run: brew install pkg-config

      - name: Detect parallelism
        id: nproc
        run: |
          if [ "${{ matrix.os }}" = "macos" ]; then
            echo "jobs=$(sysctl -n hw.ncpu)" >> "$GITHUB_OUTPUT"
          else
            echo "jobs=$(nproc)" >> "$GITHUB_OUTPUT"
          fi

      - name: Cache static OpenSSL
        id: openssl-cache
        uses: actions/cache@v4
        with:
          path: openssl-static
          key: openssl-${{ env.OPENSSL_VERSION }}-${{ matrix.runner }}

      - name: Build static OpenSSL
        if: steps.openssl-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/openssl/openssl/releases/download/openssl-${OPENSSL_VERSION}/openssl-${OPENSSL_VERSION}.tar.gz" -o openssl.tar.gz
          tar xzf openssl.tar.gz
          cd "openssl-${OPENSSL_VERSION}"
          ./Configure no-shared no-tests no-docs no-apps --prefix="$GITHUB_WORKSPACE/openssl-static" --libdir=lib
          make -j"${{ steps.nproc.outputs.jobs }}"
          make install_sw

      - name: Fetch redis ${{ inputs.redis_version }}
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/redis/redis/archive/refs/tags/${{ inputs.redis_version }}.tar.gz" -o redis.tar.gz
          tar xzf redis.tar.gz
          mv "redis-${{ inputs.redis_version }}" redis-src

      - name: Build redis
        working-directory: redis-src
        run: |
          set -euo pipefail
          # Pass BUILD_TLS and OPENSSL_PREFIX on every invocation: redis's
          # .make-settings persists CFLAGS but not OPENSSL_PREFIX, so omitting
          # it on the install step causes a distclean+rebuild that silently
          # fails to produce libhiredis_ssl.a.
          make -j"${{ steps.nproc.outputs.jobs }}" \
            BUILD_TLS=yes \
            OPENSSL_PREFIX="$GITHUB_WORKSPACE/openssl-static" \
            PREFIX="$PWD/../dist" \
            install

      - name: Verify portability (Linux)
        if: matrix.os == 'linux'
        run: |
          set -euo pipefail
          fail=0
          for bin in dist/bin/redis-server dist/bin/redis-cli dist/bin/redis-benchmark dist/bin/redis-check-aof dist/bin/redis-check-rdb; do
            [ -x "$bin" ] || continue
            echo "=== $bin ==="
            ldd "$bin"
            if ldd "$bin" | grep -iE "libssl|libcrypto"; then
              echo "FAIL: $bin dynamically links OpenSSL"
              fail=1
            fi
          done
          exit $fail

      - name: Verify portability (macOS)
        if: matrix.os == 'macos'
        run: |
          set -euo pipefail
          fail=0
          for bin in dist/bin/redis-server dist/bin/redis-cli dist/bin/redis-benchmark dist/bin/redis-check-aof dist/bin/redis-check-rdb; do
            [ -x "$bin" ] || continue
            echo "=== $bin ==="
            otool -L "$bin"
            bad=$(otool -L "$bin" | tail -n +2 | awk '{print $1}' | grep -vE '^(/usr/lib/|/System/)' || true)
            if [ -n "$bad" ]; then
              echo "FAIL: $bin references non-system libs:"
              echo "$bad"
              fail=1
            fi
          done
          exit $fail

      - name: Package binaries
        run: |
          set -euo pipefail
          name="redis-${{ inputs.redis_version }}-${{ matrix.os }}-${{ matrix.arch }}"
          mv dist "$name"
          tar czf "$name.tar.gz" "$name"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$name.tar.gz" > "$name.tar.gz.sha256"
          else
            shasum -a 256 "$name.tar.gz" > "$name.tar.gz.sha256"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: redis-${{ inputs.redis_version }}-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            redis-${{ inputs.redis_version }}-*.tar.gz
            redis-${{ inputs.redis_version }}-*.tar.gz.sha256
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.redis_version }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if gh release view "$VERSION" --repo "$REPO" >/dev/null 2>&1; then
            gh release upload "$VERSION" --repo "$REPO" --clobber artifacts/*
          else
            gh release create "$VERSION" \
              --repo "$REPO" \
              --title "Redis $VERSION" \
              --notes "Redis $VERSION binaries built from https://github.com/redis/redis/releases/tag/$VERSION" \
              artifacts/*
          fi
